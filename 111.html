<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim BTI | مؤشر الشخصية</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.*/css/pico.min.css">
    
    <style>
        :root {
            --deep-green: #096409; 
            --light-green: #E8F5E9;
            --primary: var(--deep-green);
            --primary-hover: #123C12;
        }

        body {
            background-color: var(--deep-green) !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .main-card {
            max-width: 600px;
            width: 100%;
            padding: 2.5rem;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
            background-color: var(--light-green);
        }

        .moon-symbol {
            font-size: 2.5rem;
            display: block;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .arabic-header {
            font-size: 1.5rem;
            color: var(--deep-green);
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        h1 {
            color: var(--deep-green) !important;
            text-align: center;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background-color: transparent !important;
            color: var(--deep-green) !important;
            border: 2px solid var(--deep-green) !important;
            margin-bottom: 1rem;
            text-align: left;
            width: 100%;
            font-weight: 500;
            transition: all 0.2s ease;
            line-height: 1.4;
            padding: 0.8rem 1.2rem;
        }

        .option-btn:hover {
            background-color: var(--deep-green) !important;
            color: #ffffff !important;
        }

        .start-btn {
            background-color: var(--deep-green) !important;
            border: none !important;
            color: white !important;
            padding: 1rem;
            font-size: 1.1rem;
            width: 100%;
        }

        progress::-webkit-progress-value { background-color: var(--deep-green) !important; }
        progress { background-color: var(--light-green) !important; height: 12px; }

        .hidden { display: none !important; }

        /* 结果图片样式 */
        #type-image {
            max-width: 200px; /* 控制图片大小 */
            height: auto;
            margin: 1rem auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .result-box {
            background-color: var(--light-green);
            padding: 1.5rem;
            border-radius: 12px;
            color: var(--deep-green);
            margin-top: 1.5rem;
        }

        .advice-box {
            border-left: 4px solid var(--deep-green);
            padding-left: 1rem;
            margin-top: 1rem;
            font-style: italic;
            color: #444;
        }
    </style>
</head>
<body>

    <main class="main-card">
        <section id="start-screen">
            <span class="moon-symbol">🌙</span>
            <div class="arabic-header">بسم الله الرحمن الرحيم</div>
            <h1>Muslim BTI</h1>
            <div class="subtitle">探索你的天性 (Fitra) | مؤشر الشخصية</div>
            <p style="color: #333;">欢迎参加穆斯林性格与特质测评。请根据你在日常生活和信仰实践中的真实感受进行选择。</p>
            <button class="start-btn" onclick="startQuiz()">开始测试 / ابدأ الاختبار</button>
        </section>

        <section id="quiz-screen" class="hidden">
            <progress id="quiz-progress" value="0" max="100"></progress>
            <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                <small id="progress-text" style="color: var(--deep-green); font-weight: bold;">加载中...</small>
                <span>🌙</span>
            </div>
            <h4 id="question-text" style="color: var(--deep-green) !important; text-align: left; margin-bottom: 1.5rem;">
                正在加载场景...
            </h4>
            <div id="options-group"></div>
        </section>

        <section id="result-screen" class="hidden">
            <div style="text-align: center;">
                <span class="moon-symbol">🌙</span>
                
                <img id="type-image" src="" alt="人格类型图示">
                
                <small style="letter-spacing: 2px; color: #666;">您的天性类型代码：</small>
                <h1 id="result-code" style="font-size: 3.5rem; margin: 0.5rem 0;">TYPE</h1>
                <h3 id="result-name" style="color: var(--deep-green); font-weight: 700;">称号加载中...</h3>
            </div>
            
            <div class="result-box">
                <strong>核心特质描述：</strong>
                <p id="result-desc" style="margin-top: 0.5rem; margin-bottom: 1rem;"></p>
                
                <strong>修身建议 (Nafs Advice)：</strong>
                <div id="result-advice" class="advice-box"></div>
            </div>

            <button class="outline" onclick="location.reload()" style="margin-top: 2rem; width: 100%; border-color: var(--deep-green) !important; color: var(--deep-green) !important;">重新开启测评</button>
        </section>
    </main>

    <script src="questions.js"></script>
    <script src="app.js"></script>

</body>
</html>
